{% extends 'base.html' %}
{% block content %}
<style>
  @media (max-width: 768px){
    .users-page{display:grid;gap:14px;}
  }
</style>
<div class="grid-2 users-page">
  <section class="card">
    <h1>สร้างผู้ใช้ใหม่</h1>
    <form method="post" class="form-grid">
      <label>ชื่อผู้ใช้<input name="username" required></label>
      <label>รหัสผ่าน<input name="password" required></label>
      <label>สิทธิ์
        <select name="role">
          <option value="admin">admin</option>
          <option value="user">user</option>
          <option value="superadmin">superadmin</option>
        </select>
      </label>
      <button class="btn" type="submit">บันทึก</button>
    </form>
  </section>
  <section class="card">
    <h2>รายการผู้ใช้</h2>
    <div class="table-wrap">
      <table class="table">
        <thead><tr><th>ID</th><th>Username</th><th>Role</th></tr></thead>
        <tbody>{% for user in users %}<tr><td>{{ user.id }}</td><td>{{ user.username }}</td><td>{{ user.role }}</td></tr>{% endfor %}</tbody>
      </table>
    </div>
  </section>
</div>
{% endblock %}
